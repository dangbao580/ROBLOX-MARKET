<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7F77DD"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
  </defs>

  <g transform="translate(80, 80)">
    <!-- Outer hexagon ring -->
    <path d="M0,-68 L58.9,-34 L58.9,34 L0,68 L-58.9,34 L-58.9,-34 Z"
          fill="none" stroke="url(#accent-grad)" stroke-width="3" opacity="0.9"/>
    <!-- Inner hex fill -->
    <path d="M0,-52 L45,-26 L45,26 L0,52 L-45,26 L-45,-26 Z"
          fill="#EEEDFE" opacity="0.4"/>
    <!-- M letter geometric -->
    <line x1="-24" y1="-24" x2="-24" y2="24" stroke="#534AB7" stroke-width="5" stroke-linecap="round"/>
    <line x1="-24" y1="-24" x2="0" y2="2"    stroke="#534AB7" stroke-width="5" stroke-linecap="round"/>
    <line x1="0"   y1="2"   x2="24" y2="-24" stroke="#0F6E56" stroke-width="5" stroke-linecap="round"/>
    <line x1="24"  y1="-24" x2="24" y2="24"  stroke="#0F6E56" stroke-width="5" stroke-linecap="round"/>
    <!-- Dot accent top center -->
    <circle cx="0" cy="-48" r="5" fill="url(#accent-grad)"/>
    <!-- Three small dots bottom -->
    <circle cx="-14" cy="44" r="3" fill="#7F77DD" opacity="0.7"/>
    <circle cx="0"   cy="48" r="3" fill="url(#accent-grad)" opacity="0.9"/>
    <circle cx="14"  cy="44" r="3" fill="#1D9E75" opacity="0.7"/>
  </g>
</svg>